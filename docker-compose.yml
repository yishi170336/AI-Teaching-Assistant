services:
  redis:
    image: redis:7-alpine
    container_name: circuitmind-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - circuitmind_redis:/data
    restart: unless-stopped
  qdrant:
    image: qdrant/qdrant:latest
    container_name: circuitmind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - circuitmind_qdrant:/qdrant/storage
    restart: unless-stopped
  neo4j:
    image: neo4j:5-community
    container_name: circuitmind-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/change-this-password
    volumes:
      - circuitmind_neo4j:/data
    restart: unless-stopped

volumes:
  circuitmind_redis:
  circuitmind_qdrant:
  circuitmind_neo4j:

